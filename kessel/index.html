<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Raymond | DevOps</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh;display:grid;place-items:center;padding:2rem}
    main{max-width:800px;text-align:center}
    h1{font-size:clamp(2rem,5vw,4rem);background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 50%,#06b6d4 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
    p{font-size:1.2rem;max-width:600px;margin:0 auto 2rem;line-height:1.6;color:#94a3b8}
    .repos{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-top:2rem}
    .repo{display:inline-block;padding:0.75rem 1.5rem;background:rgba(255,255,255,0.1);border-radius:50px;border:1px solid rgba(255,255,255,0.2);color:#e2e8f0;text-decoration:none;font-size:0.95rem;transition:all 0.2s}
    .repo:hover{background:rgba(255,255,255,0.2);transform:translateY(-2px)}
  </style>
</head>
<body>
  <main>
    <h1>Raymond</h1>
    <p>DevOps • Automation • Security Workflows • Mobile Linux</p>
    <div class="repos">
      <a href="https://github.com/RayRock92610/Kessel-flow" class="repo">Kessel Flow</a>
      <a href="https://github.com/RayRock92610" class="repo">More →</a>
    </div>
  </main>
</body>
</html>
